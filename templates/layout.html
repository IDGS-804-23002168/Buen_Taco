<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>El Buen Taco</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    {% block styles %}{% endblock %}

    <style>
        .navbar-custom {
            background-color: #8B3A0E;
        }

        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }

        body {
            background-color: #EDEDED;
            padding-top: 70px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='img/logo_Buen Taco.png') }}" alt="Logo">
                <span>El Buen Taco</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house"></i> Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('inventario.materias_primas') }}">
                            <i class="bi bi-box-seam"></i> Inventario
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('compras.nueva_compra') }}">
                            <i class="bi bi-cart-plus"></i> Compras
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/solicitudes">
                            <i class="bi bi-fire"></i> Cocina
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/ventas">
                            <i class="bi bi-currency-dollar"></i> Ventas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/admin">
                            <i class="bi bi-gear"></i> Administración
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('proveedores.index') }}">
                            <i class="bi bi-people"></i> Proveedores
                        </a>
                    </li>

                </ul>

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <!--<a class="nav-link" href="#">
                        <i class="bi bi-moon"></i>
                        </a>-->
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-person-circle"></i>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.logout') }}">
                            <i class="bi bi-box-arrow-right"></i> Salir
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
