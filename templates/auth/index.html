<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | El Buen Taco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Fondo dinámico con la ruta corregida */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='img/logo.jpeg') }}");
            /* Si no usas Jinja2, cambia la línea de arriba por: background-image: url('static/img/logo.jpeg'); */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Capa de desenfoque premium */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px) brightness(0.9);
        }

        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Card con efecto de cristal */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
            padding: 3.5rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
        }

        .logo-profile {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group-custom i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            z-index: 5;
        }

        .form-control {
            border-radius: 15px;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border: 1.5px solid #eee;
            background: #fdfdfd;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #2d8a39;
            box-shadow: 0 0 0 0.25rem rgba(45, 138, 57, 0.1);
            background: white;
        }

        .btn-login {
            background: linear-gradient(135deg, #2d8a39 0%, #1e5e26 100%);
            border: none;
            border-radius: 15px;
            padding: 0.9rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(45, 138, 57, 0.4);
            filter: brightness(1.1);
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 2rem 0;
            position: relative;
        }

        .divider::after {
            content: "🌮";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 0 12px;
            font-size: 1.2rem;
        }

        .forgot-link {
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #2d8a39;
        }
    </style>
</head>
<body>

<div class="bg-container">
    <div class="bg-overlay"></div>
</div>

<div class="login-wrapper">
    <div class="login-card">
        <img src="static/img/logo_Buen Taco.png" alt="El Buen Taco" class="logo-profile">
        
        <h3 class="fw-bold text-dark mb-1">BIENVENIDO</h3>
        <p class="text-secondary small mb-4">Ingresa tus credenciales para continuar</p>
        
        <form action="/login" method="POST">
            <div class="input-group-custom text-start">
                <i class="bi bi-person-fill"></i>
                <input type="text" class="form-control" name="username" placeholder="Usuario" required>
            </div>
            
            <div class="input-group-custom text-start">
                <i class="bi bi-shield-lock-fill"></i>
                <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
            </div>
            
            <div class="text-end mb-4">
                <a href="#" class="forgot-link">¿Olvidaste tu acceso?</a>
            </div>
            
            <button type="submit" class="btn btn-login w-100">
                ENTRAR AL PORTAL <i class="bi bi-arrow-right-short fs-5"></i>
            </button>
        </form>

        <div class="divider"></div>
        
        <p class="text-muted mb-0" style="font-size: 0.75rem;">
            Sistema de Gestión v2.0<br>
            <strong>Taquería El Buen Taco</strong>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
